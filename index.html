<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EONE Audio Examples</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0a0a0c;
      --surface:   #111115;
      --surface2:  #18181e;
      --border:    #222230;
      --border2:   #2e2e40;
      --accent:    #c8f060;
      --accent2:   #f06090;
      --accent3:   #60b4f0;
      --text:      #dddde8;
      --text-dim:  #66667a;
      --text-muted:#2e2e3e;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
      --r: 6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 36px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 200;
      background: rgba(10,10,12,0.92); backdrop-filter: blur(16px);
    }
    .brand { font-weight: 800; font-size: 15px; letter-spacing: 0.04em; color: var(--accent); text-transform: uppercase; }
    .brand span { color: var(--text-dim); font-weight: 400; }

    /* ── Intro ── */
    .intro {
      max-width: 860px; margin: 48px auto 0; padding: 0 36px 40px;
      border-bottom: 1px solid var(--border);
    }
    .intro h1 { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 16px; }
    .intro h1 em { color: var(--accent); font-style: normal; }
    .intro p { font-size: 14px; color: var(--text-dim); line-height: 1.75; max-width: 640px; }

    /* ── Model overview figure ── */
    .model-figure { max-width: 860px; margin: 40px auto; padding: 0 36px; }
    .model-figure figcaption {
      font-family: var(--mono); font-size: 10px; color: var(--text-muted);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px;
    }
    .model-figure img {
      width: 100%; border-radius: var(--r); border: 1px solid var(--border2);
      display: block; cursor: zoom-in; transition: border-color 0.2s;
    }
    .model-figure img:hover { border-color: var(--accent); }

    /* ── Table area ── */
    #table-area { padding: 32px 36px 90px; }

    .ex-block { margin-bottom: 56px; }
    .ex-head {
      display: flex; align-items: baseline; gap: 14px;
      margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border2);
    }
    .ex-head h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
    .ex-head .ex-meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── Comparison table ── */
    .cmp-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    .cmp-table colgroup col.col-idx { width: 48px; }

    .cmp-table thead th {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em;
      text-transform: uppercase; padding: 6px 8px 10px; text-align: left;
      border-bottom: 1px solid var(--border); color: var(--text-dim);
    }
    .cmp-table thead th.col-idx { padding-left: 0; }

    .cmp-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .cmp-table tbody tr:last-child { border-bottom: none; }
    .cmp-table tbody tr:hover { background: rgba(255,255,255,0.015); }
    .cmp-table td { padding: 10px 8px; vertical-align: middle; }
    .cmp-table td.col-idx {
      font-family: var(--mono); font-size: 9px; color: var(--text-muted);
      padding-left: 0; text-align: right; padding-right: 12px;
    }

    /* ── Audio widget ── */
    .aw {
      display: flex; align-items: center; gap: 9px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 7px 10px;
      transition: border-color 0.18s; min-width: 0;
    }
    .aw:hover { border-color: var(--border2); }

    .aw-btn {
      width: 26px; height: 26px; flex-shrink: 0; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, background 0.15s;
    }
    .aw-btn:active { transform: scale(0.86); }
    .aw-btn svg { width: 9px; height: 9px; pointer-events: none; }

    .aw-wave {
      flex: 1; height: 26px; cursor: pointer; overflow: hidden;
      display: flex; align-items: center; gap: 1.5px; min-width: 0;
    }
    .aw-bar { flex-shrink: 0; width: 2px; border-radius: 1px; }
    .aw-fname { font-family: var(--mono); font-size: 9px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 110px; flex-shrink: 0; }
    .aw-time  { font-family: var(--mono); font-size: 9px; color: var(--text-dim); min-width: 28px; text-align: right; flex-shrink: 0; }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    #lightbox.on { display: flex; }
    #lightbox img { max-width: 94vw; max-height: 94vh; border-radius: var(--r); }

    /* ── Now playing ── */
    #now-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 38px;
      background: var(--surface); border-top: 1px solid var(--border);
      display: none; align-items: center; padding: 0 36px; gap: 12px; z-index: 100;
    }
    #now-bar.on { display: flex; }
    #now-label { font-family: var(--mono); font-size: 10px; color: var(--text-dim); }
    #now-label b { color: var(--text); }
    .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  </style>
</head>
<body>

<header>
  <div class="brand">EONE <span>/</span> Audio Examples</div>
</header>

<div class="intro">
  <h1>Audio Examples — <em>EONE</em></h1>
  <p>
    Listening examples comparing ground-truth targets against two model outputs:
    <strong style="color:var(--accent2)">EOE</strong> and
    <strong style="color:var(--accent3)">EONE (ours)</strong>.
    Click ▶ to play, or click anywhere on the waveform to seek.
  </p>
</div>

<figure class="model-figure">
  <figcaption>Model overview</figcaption>
  <img src="figures/model_overview.png" alt="Model overview"
       onclick="openLightbox(this.src)" title="Click to enlarge" />
</figure>

<div id="table-area"></div>

<div id="lightbox" onclick="closeLightbox()">
  <img id="lb-img" src="" alt="model overview" />
</div>

<div id="now-bar"><div class="pulse"></div><div id="now-label">—</div></div>

<script>
'use strict';

// ── Path configuration ─────────────────────────────────────────────────────
//
// USE_RAW_GITHUB = false  →  relative paths  (works locally + on GitHub Pages)
// USE_RAW_GITHUB = true   →  raw.githubusercontent.com paths (more reliable
//                             for large audio files on GitHub Pages)
//
const USE_RAW_GITHUB  = false;
const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/aes2026-anon/eone-model-page/main';

function p(rel) {
  return USE_RAW_GITHUB ? `${GITHUB_RAW_BASE}/${rel}` : rel;
}

// ── Column definitions (fixed order: Target → EOE → EONE (ours)) ───────────
const COLUMNS = [
  { folder: 'targets',          label: 'Target',      colorVar: '--accent',  playColor: 'rgba(200,240,96,0.35)' },
  { folder: 'predictions_eoe',  label: 'EOE',         colorVar: '--accent2', playColor: 'rgba(240,96,144,0.35)' },
  { folder: 'predictions_eone', label: 'EONE (ours)', colorVar: '#60b4f0',   playColor: 'rgba(96,180,240,0.35)' },
];

// ── Example manifest ───────────────────────────────────────────────────────
//
// Add or remove example folder names here as you add data to the repo.
// N_FILES is the number of audio files per role folder (01 … N_FILES).
//
const EXAMPLES   = ['example-01','example-02','example-03','example-04','example-05',
                     'example-06','example-07','example-08','example-09'];
const N_FILES    = 3;

// ── Render ─────────────────────────────────────────────────────────────────
const AUDIO_EXT = /\.(wav|mp3|ogg|flac|aac|m4a)$/i;
let activeAudio = null, activeWidget = null;

function render() {
  const area = document.getElementById('table-area');

  for (const example of EXAMPLES) {
    const block = document.createElement('div');
    block.className = 'ex-block';

    const head = document.createElement('div');
    head.className = 'ex-head';
    head.innerHTML = `<h2>${esc(example)}</h2><span class="ex-meta">${N_FILES} examples</span>`;
    block.appendChild(head);

    const colgroup = `<colgroup><col class="col-idx"/>${COLUMNS.map(() => '<col/>').join('')}</colgroup>`;
    const ths = COLUMNS.map(col => {
      const c = col.colorVar.startsWith('--') ? `var(${col.colorVar})` : col.colorVar;
      return `<th style="color:${c}">▲ ${esc(col.label)}</th>`;
    }).join('');

    const table = document.createElement('table');
    table.className = 'cmp-table';
    table.innerHTML = `${colgroup}<thead><tr><th class="col-idx">#</th>${ths}</tr></thead>`;

    const tbody = document.createElement('tbody');

    for (let i = 1; i <= N_FILES; i++) {
      const idx = String(i).padStart(2, '0');
      const tr  = document.createElement('tr');

      const tdIdx = document.createElement('td');
      tdIdx.className = 'col-idx';
      tdIdx.textContent = idx;
      tr.appendChild(tdIdx);

      for (const col of COLUMNS) {
        const url = p(`audiofiles/${example}/${col.folder}/${col.folder}_${idx}.wav`);
        const td  = document.createElement('td');
        td.appendChild(makeWidget(url, col.colorVar, col.playColor,
          `${example} / ${col.label} / ${idx}`));
        tr.appendChild(td);
      }

      tbody.appendChild(tr);
    }

    table.appendChild(tbody);
    block.appendChild(table);
    area.appendChild(block);
  }
}

// ── Audio widget ───────────────────────────────────────────────────────────
function makeWidget(url, colorVar, playingColor, label) {
  const wrap   = document.createElement('div');
  wrap.className = 'aw';
  const BAR_N  = 44;
  const col    = colorVar.startsWith('--') ? `var(${colorVar})` : colorVar;

  const btn = document.createElement('button');
  btn.className = 'aw-btn';
  btn.innerHTML = svgPlay();
  btn.style.cssText = `background:${col}1a;color:${col}`;
  btn.addEventListener('mouseover', () => { if (!wrap.classList.contains('playing')) btn.style.background = `${col}33`; });
  btn.addEventListener('mouseout',  () => { if (!wrap.classList.contains('playing')) btn.style.background = `${col}1a`; });

  const waveWrap = document.createElement('div');
  waveWrap.className = 'aw-wave';
  const bars = Array.from({ length: BAR_N }, () => {
    const b = document.createElement('div');
    b.className = 'aw-bar';
    b.style.cssText = `background:${col};opacity:0.3;height:${15+Math.random()*85}%`;
    waveWrap.appendChild(b); return b;
  });

  const fnameEl = document.createElement('div');
  fnameEl.className = 'aw-fname';
  fnameEl.textContent = label;
  fnameEl.title = url;

  const timeEl = document.createElement('div');
  timeEl.className = 'aw-time';
  timeEl.textContent = '0:00';

  wrap.append(btn, waveWrap, fnameEl, timeEl);

  // preload="none" avoids loading all ~216 files on page open
  const audio = new Audio();
  audio.preload = 'none';
  audio.src = url;

  const fmt = s => Math.floor(s/60)+':'+Math.floor(s%60).toString().padStart(2,'0');
  const updateBars = () => {
    if (!audio.duration) return;
    const played = Math.floor((audio.currentTime/audio.duration)*BAR_N);
    bars.forEach((b,i) => b.style.opacity = i < played ? '1' : '0.3');
    timeEl.textContent = fmt(audio.currentTime);
  };

  audio.addEventListener('loadedmetadata', () => timeEl.textContent = fmt(audio.duration));
  audio.addEventListener('timeupdate', updateBars);
  audio.addEventListener('error', () => {
    timeEl.textContent = '—';
    btn.style.opacity = '0.3';
    btn.title = 'File not found: ' + url;
  });
  audio.addEventListener('ended', () => {
    btn.innerHTML = svgPlay(); wrap.classList.remove('playing');
    wrap.style.borderColor = ''; btn.style.background = `${col}1a`;
    bars.forEach(b => b.style.opacity = '0.3');
    if (audio.duration) timeEl.textContent = fmt(audio.duration);
    activeAudio = null; activeWidget = null; setNowPlaying(null);
  });

  const toggle = () => {
    if (activeAudio && activeAudio !== audio) {
      activeAudio.pause();
      if (activeWidget) {
        const prevCol = activeWidget.querySelector('.aw-btn').style.color;
        activeWidget.classList.remove('playing');
        activeWidget.style.borderColor = '';
        activeWidget.querySelector('.aw-btn').innerHTML = svgPlay();
        activeWidget.querySelector('.aw-btn').style.background = `${prevCol}1a`;
      }
    }
    if (audio.paused) {
      audio.play().catch(e => {
        console.warn('Play failed:', url, e);
        timeEl.textContent = 'err';
      });
      btn.innerHTML = svgPause(); wrap.classList.add('playing');
      wrap.style.borderColor = playingColor; btn.style.background = `${col}33`;
      activeAudio = audio; activeWidget = wrap; setNowPlaying(label);
    } else {
      audio.pause(); btn.innerHTML = svgPlay(); wrap.classList.remove('playing');
      wrap.style.borderColor = ''; btn.style.background = `${col}1a`;
      activeAudio = null; activeWidget = null; setNowPlaying(null);
    }
  };

  btn.addEventListener('click', toggle);
  waveWrap.addEventListener('click', e => {
    if (!audio.duration) { toggle(); return; }
    const r = waveWrap.getBoundingClientRect();
    audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
    updateBars();
  });

  return wrap;
}

// ── Lightbox ───────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lb-img').src = src;
  document.getElementById('lightbox').classList.add('on');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('on'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ── Now playing ────────────────────────────────────────────────────────────
function setNowPlaying(label) {
  const bar = document.getElementById('now-bar');
  const lbl = document.getElementById('now-label');
  if (label) {
    const parts = label.split(' / ');
    lbl.innerHTML = `<b>${esc(parts[0])}</b> / ${esc(parts[1])} / ${esc(parts[2]||'')}`;
    bar.classList.add('on');
  } else { bar.classList.remove('on'); }
}

function svgPlay()  { return `<svg viewBox="0 0 10 10" fill="currentColor"><polygon points="2,1 9,5 2,9"/></svg>`; }
function svgPause() { return `<svg viewBox="0 0 10 10" fill="currentColor"><rect x="1" y="1" width="3" height="8" rx=".8"/><rect x="6" y="1" width="3" height="8" rx=".8"/></svg>`; }
function esc(s)     { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Boot ───────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
